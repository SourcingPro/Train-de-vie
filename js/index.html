<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Train de vie</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F2;
      --surface: #FFFFFF;
      --text-primary: #1A1814;
      --text-secondary: #7A7670;
      --text-muted: #B0ADA8;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.15);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --shadow-card: 0 2px 16px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.10), 0 0 0 0.5px rgba(0,0,0,0.08);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141210;
        --surface: #1E1C19;
        --text-primary: #F0EDE8;
        --text-secondary: #8A8782;
        --text-muted: #5A5855;
        --border: rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.12);
        --shadow-card: 0 2px 16px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.04);
        --shadow-hover: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.07);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .wordmark {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .wordmark-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      background: var(--text-primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wordmark-icon svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--bg);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wordmark h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .wordmark p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .profiles-container {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .profile-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      border: none;
      text-align: left;
      width: 100%;
      transition: transform var(--transition), box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .profile-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .profile-card:active {
      transform: translateY(0) scale(0.98);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 600;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .avatar-initials {
      position: relative;
      z-index: 1;
    }

    .profile-info { flex: 1; }

    .profile-name {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .profile-subtitle {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    .profile-arrow { color: var(--text-muted); flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.25rem 0;
    }

    .divider-line { flex: 1; height: 0.5px; background: var(--border); }

    .divider-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .add-profile-btn {
      background: transparent;
      border: 0.5px dashed var(--border-strong);
      border-radius: var(--radius-md);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      color: var(--text-secondary);
      font-size: 0.9375rem;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .add-profile-btn:hover {
      border-style: solid;
      color: var(--text-primary);
    }

    .add-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--text-secondary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      width: 100%;
      max-width: 360px;
      transform: translateY(20px);
      transition: transform var(--transition);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      letter-spacing: -0.01em;
    }

    .modal p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .modal input {
      width: 100%;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-strong);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition);
    }

    .modal input:focus { border-color: var(--text-primary); }

    .modal-actions {
      display: flex;
      gap: 0.625rem;
      margin-top: 1rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-strong);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9375rem;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-create {
      flex: 2;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--text-primary);
      color: var(--bg);
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .btn-create:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

  <div class="wordmark">
    <div class="wordmark-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z"/>
        <path d="M12 12L3 7"/>
        <path d="M12 12v10"/>
        <path d="M12 12l9-5"/>
      </svg>
    </div>
    <h1>Train de vie</h1>
    <p>Choisissez votre profil</p>
  </div>

  <div class="profiles-container" id="profiles-container">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Chargement…</span>
    </div>
  </div>

  <div class="footer">Train de vie · Hugo &amp; Audrey</div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Nouveau profil</h2>
      <p>Entrez le prénom pour ce profil.</p>
      <input type="text" id="profile-name-input" placeholder="Prénom" maxlength="30" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Annuler</button>
        <button class="btn-create" id="btn-create" disabled>Créer le profil</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dfvkklbeudhuqopdliyj.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmdmtrbGJldWRodXFvcGRsaXlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MzUwOTUsImV4cCI6MjA5ODMxMTA5NX0.nLtbF1WddqmeIHE38Ow6Np7Lj-4ypoBZsmIMu8tSjfE'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const PROFILE_COLORS = [
      { initial_bg: '#DBEAFE', text: '#1A56DB' },
      { initial_bg: '#FCE4EC', text: '#C2185B' },
      { initial_bg: '#DCEDC8', text: '#2E7D32' },
      { initial_bg: '#FFE0B2', text: '#E65100' },
      { initial_bg: '#EDE7F6', text: '#6A1B9A' },
    ]

    function getColorForName(name) {
      return PROFILE_COLORS[name.charCodeAt(0) % PROFILE_COLORS.length]
    }

    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
    }

    async function ensureHousehold() {
      let { data } = await db.from('household').select('*').limit(1).maybeSingle()
      if (!data) {
        const { data: created } = await db.from('household').insert({ name: 'Hugo & Audrey' }).select().single()
        data = created
      }
      return data
    }

    async function loadProfiles() {
      const { data } = await db.from('profiles').select('*').order('created_at')
      return data || []
    }

    function renderProfiles(profiles) {
      const container = document.getElementById('profiles-container')
      container.innerHTML = ''

      if (profiles.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:1.5rem 0;color:var(--text-muted);font-size:0.875rem;">Aucun profil.<br/>Créez le premier ci-dessous.</div>`
      } else {
        profiles.forEach(profile => {
          const color = getColorForName(profile.name)
          const card = document.createElement('button')
          card.className = 'profile-card'
          card.innerHTML = `
            <div class="avatar" style="background:${color.initial_bg};color:${color.text};">
              ${profile.avatar_url ? `<img src="${profile.avatar_url}" alt="${profile.name}"/>` : `<span class="avatar-initials">${initials(profile.name)}</span>`}
            </div>
            <div class="profile-info">
              <div class="profile-name">${profile.name}</div>
              <div class="profile-subtitle">Accéder à mon profil</div>
            </div>
            <div class="profile-arrow">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg>
            </div>
          `
          card.addEventListener('click', () => {
            localStorage.setItem('tdv_profile_id', profile.id)
            localStorage.setItem('tdv_profile_name', profile.name)
            window.location.href = 'app.html'
          })
          container.appendChild(card)
        })
      }

      const divider = document.createElement('div')
      divider.className = 'divider'
      divider.innerHTML = `<div class="divider-line"></div><span class="divider-text">ou</span><div class="divider-line"></div>`
      container.appendChild(divider)

      const addBtn = document.createElement('button')
      addBtn.className = 'add-profile-btn'
      addBtn.innerHTML = `<div class="add-icon">+</div><span>Ajouter un profil</span>`
      addBtn.addEventListener('click', () => {
        document.getElementById('modal-overlay').classList.add('open')
        document.getElementById('profile-name-input').value = ''
        document.getElementById('btn-create').disabled = true
        setTimeout(() => document.getElementById('profile-name-input').focus(), 100)
      })
      container.appendChild(addBtn)
    }

    document.getElementById('btn-cancel').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('open')
    })

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) document.getElementById('modal-overlay').classList.remove('open')
    })

    document.getElementById('profile-name-input').addEventListener('input', (e) => {
      document.getElementById('btn-create').disabled = e.target.value.trim().length < 2
    })

    document.getElementById('profile-name-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-create').click()
    })

    document.getElementById('btn-create').addEventListener('click', async () => {
      const name = document.getElementById('profile-name-input').value.trim()
      if (!name) return
      const btn = document.getElementById('btn-create')
      btn.disabled = true
      btn.textContent = 'Création…'
      try {
        const { data: profile } = await db.from('profiles').insert({ name }).select().single()
        const household = await ensureHousehold()
        await db.from('profile_household').insert({ profile_id: profile.id, household_id: household.id })
        document.getElementById('modal-overlay').classList.remove('open')
        renderProfiles(await loadProfiles())
      } catch (err) {
        console.error(err)
        btn.disabled = false
        btn.textContent = 'Créer le profil'
      }
    })

    loadProfiles().then(renderProfiles)
  </script>
</body>
</html>

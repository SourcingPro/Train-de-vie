<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Train de vie</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #FAFAF8;
      color: #1A1814;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      width: 56px; height: 56px;
      background: #1A1814;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .logo svg { width: 28px; height: 28px; fill: none; stroke: #FAFAF8; stroke-width: 1.5; stroke-linecap: round; }
    h1 { font-size: 1.5rem; font-weight: 600; text-align: center; letter-spacing: -0.02em; }
    p { font-size: 0.875rem; color: #B0ADA8; text-align: center; margin-top: 0.25rem; margin-bottom: 3rem; }
    .profiles { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 0.75rem; }
    .profile-btn {
      background: #fff;
      border: none;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      cursor: pointer; text-align: left; width: 100%;
      transition: transform 0.15s;
    }
    .profile-btn:active { transform: scale(0.98); }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.125rem; font-weight: 700; flex-shrink: 0;
    }
    .profile-name { font-size: 1rem; font-weight: 600; }
    .profile-sub { font-size: 0.8125rem; color: #B0ADA8; margin-top: 2px; }
    .chevron { margin-left: auto; color: #B0ADA8; }
    .add-btn {
      background: transparent;
      border: 1.5px dashed rgba(0,0,0,0.15);
      border-radius: 20px;
      padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
      cursor: pointer; width: 100%; color: #7A7670;
      font-size: 0.9375rem; font-family: inherit;
      transition: border-color 0.15s;
    }
    .add-btn:hover { border-color: rgba(0,0,0,0.3); }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 0.25rem 0; }
    .divider-line { flex: 1; height: 0.5px; background: rgba(0,0,0,0.08); }
    .divider-text { font-size: 0.75rem; color: #B0ADA8; text-transform: uppercase; letter-spacing: 0.04em; }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: #fff; border-radius: 24px; padding: 1.75rem;
      width: 100%; max-width: 360px;
      transform: translateY(20px); transition: transform 0.2s;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet h2 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.375rem; }
    .sheet p { font-size: 0.875rem; color: #7A7670; margin-bottom: 1.25rem; }
    input {
      width: 100%; padding: 0.875rem 1rem;
      border: 1px solid rgba(0,0,0,0.15); border-radius: 12px;
      font-size: 1rem; font-family: inherit; outline: none;
      background: #FAFAF8; color: #1A1814;
    }
    input:focus { border-color: #1A1814; }
    .actions { display: flex; gap: 0.625rem; margin-top: 1rem; }
    .btn-cancel {
      flex: 1; padding: 0.75rem; border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.15); background: transparent;
      font-size: 0.9375rem; font-family: inherit; cursor: pointer; color: #7A7670;
    }
    .btn-create {
      flex: 2; padding: 0.75rem; border-radius: 12px;
      border: none; background: #1A1814; color: #FAFAF8;
      font-size: 0.9375rem; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-create:disabled { opacity: 0.35; cursor: default; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid rgba(0,0,0,0.1);
      border-top-color: #7A7670; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2z"/><path d="M12 12L3 7"/><path d="M12 12v10"/><path d="M12 12l9-5"/></svg>
  </div>
  <h1>Train de vie</h1>
  <p>Choisissez votre profil</p>

  <div class="profiles" id="profiles">
    <div class="spinner"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="sheet">
      <h2>Nouveau profil</h2>
      <p>Entrez le prénom pour ce profil.</p>
      <input id="name-input" placeholder="Prénom" maxlength="30" autocomplete="off" />
      <div class="actions">
        <button class="btn-cancel" id="btn-cancel">Annuler</button>
        <button class="btn-create" id="btn-create" disabled>Créer</button>
      </div>
    </div>
  </div>

  <script>
    const db = supabase.createClient(
      'https://dfvkklbeudhuqopdliyj.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmdmtrbGJldWRodXFvcGRsaXlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MzUwOTUsImV4cCI6MjA5ODMxMTA5NX0.nLtbF1WddqmeIHE38Ow6Np7Lj-4ypoBZsmIMu8tSjfE'
    )

    const COLORS = [
      { bg: '#DBEAFE', text: '#1A56DB' },
      { bg: '#FCE4EC', text: '#C2185B' },
      { bg: '#DCEDC8', text: '#2E7D32' },
      { bg: '#FFE0B2', text: '#E65100' },
      { bg: '#EDE7F6', text: '#6A1B9A' },
    ]

    function colorFor(name) {
      return COLORS[name.charCodeAt(0) % COLORS.length]
    }

    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
    }

    async function ensureHousehold() {
      let { data } = await db.from('household').select('*').limit(1).maybeSingle()
      if (!data) {
        const { data: created } = await db.from('household').insert({ name: 'Train de vie' }).select().single()
        data = created
      }
      return data
    }

    async function load() {
      const { data: profiles } = await db.from('profiles').select('*').order('created_at')
      render(profiles || [])
    }

    function render(profiles) {
      const el = document.getElementById('profiles')
      el.innerHTML = ''

      if (!profiles.length) {
        el.innerHTML = '<p style="text-align:center;color:#B0ADA8;font-size:0.875rem;">Aucun profil. Créez le premier ci-dessous.</p>'
      } else {
        profiles.forEach(p => {
          const c = colorFor(p.name)
          const btn = document.createElement('button')
          btn.className = 'profile-btn'
          btn.innerHTML = `
            <div class="avatar" style="background:${c.bg};color:${c.text}">${initials(p.name)}</div>
            <div>
              <div class="profile-name">${p.name}</div>
              <div class="profile-sub">Accéder à mon profil</div>
            </div>
            <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
          `
          btn.onclick = () => {
            localStorage.setItem('tdv_profile_id', p.id)
            localStorage.setItem('tdv_profile_name', p.name)
            window.location.href = 'app.html'
          }
          el.appendChild(btn)
        })
        const div = document.createElement('div')
        div.className = 'divider'
        div.innerHTML = '<div class="divider-line"></div><span class="divider-text">ou</span><div class="divider-line"></div>'
        el.appendChild(div)
      }

      const add = document.createElement('button')
      add.className = 'add-btn'
      add.innerHTML = '<span style="font-size:1.25rem">+</span> Ajouter un profil'
      add.onclick = openModal
      el.appendChild(add)
    }

    function openModal() {
      document.getElementById('name-input').value = ''
      document.getElementById('btn-create').disabled = true
      document.getElementById('overlay').classList.add('open')
      setTimeout(() => document.getElementById('name-input').focus(), 100)
    }

    function closeModal() {
      document.getElementById('overlay').classList.remove('open')
    }

    document.getElementById('name-input').oninput = e => {
      document.getElementById('btn-create').disabled = e.target.value.trim().length < 2
    }
    document.getElementById('name-input').onkeydown = e => {
      if (e.key === 'Enter') document.getElementById('btn-create').click()
    }
    document.getElementById('btn-cancel').onclick = closeModal
    document.getElementById('overlay').onclick = e => { if (e.target === e.currentTarget) closeModal() }

    document.getElementById('btn-create').onclick = async () => {
      const name = document.getElementById('name-input').value.trim()
      if (!name) return
      const btn = document.getElementById('btn-create')
      btn.disabled = true
      btn.textContent = '...'
      try {
        const { data: p } = await db.from('profiles').insert({ name }).select().single()
        const h = await ensureHousehold()
        await db.from('profile_household').insert({ profile_id: p.id, household_id: h.id })
        closeModal()
        load()
      } catch (e) {
        console.error(e)
        btn.disabled = false
        btn.textContent = 'Créer'
      }
    }

    load()
  </script>
</body>
</html>
